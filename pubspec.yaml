name: love_me
description: "Love Me International — global dating app (Flutter front end)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

# ---------------------------------------------------------------------------
# Front end (Phases 1-4) + backend-integration track (Auth & Profile layer).
# geolocator added 2026-07-10 for real onboarding GPS capture.
# firebase_core/firebase_messaging added 2026-07-11 for push notifications
# (client side only — see developer.log). in_app_purchase added 2026-07-15
# for real Google Play Billing (FINAL TIER — see BACKEND_PAYMENTS_HANDOFF.md).
# flutter_webrtc remains unused (calling uses Agora, not WebRTC directly).
# ---------------------------------------------------------------------------
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.0

  # Media capture + on-device photo validation
  image_picker: ^1.1.2
  google_mlkit_face_detection: ^0.13.1
  record: ^7.1.1            # voice message recording (5.x ships a broken record_linux)
  video_thumbnail: ^0.5.3   # thumbnail for chat video messages (DB-required)
  path_provider: ^2.1.4     # temp paths for recording/thumbnail files
  geolocator: ^13.0.2       # real GPS capture for onboarding "use my location"
  flutter_ringtone_player: ^4.0.0+2  # plays the device's system notification sound (Settings ringtone preview)

  # Voice / video calling
  agora_rtc_engine: ^6.5.0  # Agora RTC engine (media transport for calls)
  permission_handler: ^11.3.1  # runtime mic/camera permission for calls

  # Billing (Google Play subscriptions)
  in_app_purchase: ^3.2.0

  # State & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Routing
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.0
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.2

  # Forms & validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.0
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  shared_preferences: ^2.3.3
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/mock/

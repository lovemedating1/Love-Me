name: love_me
description: "Love Me International — global dating app (Flutter front end)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

# ---------------------------------------------------------------------------
# Front end (Phases 1-4) + backend-integration track (Auth & Profile layer).
# Firebase, flutter_webrtc, payment SDKs, in_app_purchase remain DEFERRED
# until the tables/features they back are live. geolocator added 2026-07-10
# for real onboarding GPS capture.
# ---------------------------------------------------------------------------
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.0

  # Media capture + on-device photo validation
  image_picker: ^1.1.2
  google_mlkit_face_detection: ^0.13.1
  record: ^7.1.1            # voice message recording (5.x ships a broken record_linux)
  video_thumbnail: ^0.5.3   # thumbnail for chat video messages (DB-required)
  path_provider: ^2.1.4     # temp paths for recording/thumbnail files
  geolocator: ^13.0.2       # real GPS capture for onboarding "use my location"

  # State & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Routing
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.0
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.2

  # Forms & validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.0
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/mock/
